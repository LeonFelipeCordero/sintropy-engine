version: "3.9"

services:
  postgres:
    image: ghcr.io/leonfelipecordero/postgres-wal2json:17
    restart: always
    networks:
      - app
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres:$HOME/postgres/pgdata/data

  # LGTM Stack (Loki, Grafana, Tempo, Mimir) for observability
  # https://grafana.com/docs/opentelemetry/docker-lgtm/
  lgtm:
    image: grafana/otel-lgtm:latest
    networks:
      - app
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - lgtm-data:/data

networks:
  app:
    driver: bridge

volumes:
  postgres:
  lgtm-data:
