receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'postgres'
          scrape_interval: 15s
          static_configs:
            - targets: ['postgres-exporter:9187']
              labels:
                instance: 'postgres'

exporters:
  otlphttp/metrics:
    endpoint: http://localhost:9009/otlp
  otlphttp/traces:
    endpoint: http://localhost:4418
  otlphttp/logs:
    endpoint: http://localhost:3100/otlp

processors:
  batch:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces]
    metrics:
      receivers: [otlp, prometheus.yaml]
      processors: [batch]
      exporters: [otlphttp/metrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs]
