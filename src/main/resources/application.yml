quarkus:
  arc:
    fail-on-intercepted-private-method: false
  application:
    name: sintropy-engine
    version: 0.0.1
  log:
    console:
      format: '%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n'
      json:
        enabled: false
#      format: '%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n' -- this is how prod will be
    level: INFO
  datasource:
    username: postgres
    password: postgres
    db-kind: postgresql
    jdbc:
      url: jdbc:postgresql://localhost:5432/postgres
  flyway:
    migrate-at-start: true
  jooq:
    dialect: POSTGRES
  http:
    port: 8080
  swagger-ui:
    always-include: true
  smallrye-openapi:
    info-title: Sintropy Engine API
    info-version: ${quarkus.application.version}
    info-description: Message broker supporting QUEUE and STREAM channel types

  # OpenTelemetry configuration
  otel:
    exporter:
      otlp:
        endpoint: http://localhost:4317
        traces:
          endpoint: http://localhost:4317
    logs:
      exporter: none

  # Micrometer OTLP metrics configuration
  micrometer:
    export:
      otlp:
        enabled: true
        url: http://localhost:4318/v1/metrics
    binder:
      http-server:
        enabled: true
      jvm: true
      system: true

syen:
  feature-flags:
    with-full-replication: false

"%test":
  quarkus:
    log:
      level: INFO
    otel:
      sdk:
        disabled: true
    micrometer:
      export:
        otlp:
          enabled: false
