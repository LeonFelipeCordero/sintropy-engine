name: Publish PostgreSQL Image

on:
  push:
    branches: [ main ]
    paths:
      - 'development/postgres17-wal2json/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leonfelipecordero/postgres-wal2json

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: development/postgres17-wal2json
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:17
